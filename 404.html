<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Stackly</title>

    <link rel="stylesheet" href="404.css" />

    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
        rel="stylesheet"
    />
</head>
<body>

    <div class="overlay"></div>

    <section class="error-container">

        <div class="logo">
            <i class="ri-scales-3-line"></i>
            <span>Stackly</span>
        </div>

        <div class="content">

            <div class="error-text">
                <h1>404!</h1>

                <h2>Page Not Found</h2>

                <p>
                    The document you are seeking does not exist or has been moved.
                    Let us guide you back to your legal portal.
                </p>

                <div class="buttons">
                    <a href="index.html" class="btn primary-btn">
                        <i class="ri-home-5-line"></i>
                        Back To Login
                    </a>
                </div>
            </div>

            <div class="error-image">
                <div class="plate">
                    <i class="ri-scales-3-line gavel-icon"></i>
                </div>
            </div>

        </div>

    </section>

</body>
</html>
