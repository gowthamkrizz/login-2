<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>

<body>
    
<video class="bg-video" autoplay muted loop playsinline>
        
        <source src=".//assets/12603586_3840_2160_30fps (1) (1).mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="container">

        <div class="left-section">
            <h1>Stackly</h1>
            <h2>Trusted legal<br>counsel, precise<br>and confidential.</h2>
            <p>Access your legal portal. Secure. Discreet. Always available.</p>
        </div>

        <div class="login-box">
            <h2>Sign In</h2>

            <form id="loginForm">

                <select id="role" required>
                    <option value="">Select Role</option>
                    <option value="user">Client</option>
                    <option value="admin">Attorney</option>
                </select>

                <input type="email" id="loginEmail" placeholder="Email Address" autocomplete="username" required />
                
                <div class="password-field">
                    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" required />
                    <i class="ri-eye-off-line toggle-password" id="toggleLoginPassword"></i>
                </div>

                <button type="submit">Sign In</button>

                <div class="social-login">
                    <p>Or continue with</p>
                    <div class="social-icons">
                        <a href="404.html" class="social-icon"><i class="ri-google-fill"></i></a>
                        <a href="404.html" class="social-icon"><i class="ri-facebook-fill"></i></a>
                    </div>
                </div>

                <div class="options">
                    <label><input type="checkbox" /> Remember me</label>
                    <a href="404.html">Forgot Password?</a>
                </div>

                <p class="signup-text">
                    New to Stackly?
                    <a href="signin.html">Sign Up</a>
                </p>

            </form>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
